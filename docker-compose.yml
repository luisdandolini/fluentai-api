services:
  postgres:
    image: postgres:16-alpine
    container_name: fluentai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - fluentai_data:/var/lib/postgresql/data

volumes:
  fluentai_data:
